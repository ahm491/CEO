const loaded={};
function decode(b){const bin=atob(b);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new TextDecoder("utf-8").decode(u);}
function open(k){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.t===k));
  document.querySelectorAll(".frame").forEach(f=>f.classList.toggle("on",f.id==="fr-"+k));
  if(!loaded[k]){document.getElementById("if-"+k).srcdoc=decode(SRC[k]);loaded[k]=1;}
  try{localStorage.setItem("mkn-hub-tab",k);}catch(e){}
}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>open(t.dataset.t)));
let start="daily";
try{const s=localStorage.getItem("mkn-hub-tab");if(s&&SRC[s])start=s;}catch(e){}
open(start);
</script></body></html>
